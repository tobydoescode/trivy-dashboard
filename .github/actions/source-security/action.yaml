name: Source security
description: Run source-level vulnerability checks.

runs:
  using: composite
  steps:
    - name: Install govulncheck
      shell: bash
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run govulncheck
      shell: bash
      run: |
        set -euo pipefail
        "$(go env GOPATH)/bin/govulncheck" ./... 2>&1 | tee govulncheck.txt

    - name: Write source security summary
      if: always()
      shell: bash
      run: |
        {
          echo "## Source Security"
          echo ""
          if [[ -s govulncheck.txt ]]; then
            echo '```'
            tail -n 80 govulncheck.txt
            echo '```'
          else
            echo "govulncheck produced no output."
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload source security reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: source-security-reports
        path: govulncheck.txt
        if-no-files-found: warn
