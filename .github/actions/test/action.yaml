name: Test and coverage
description: Run Go and JavaScript tests, then publish coverage artifacts.

runs:
  using: composite
  steps:
    - name: Install gotestsum
      shell: bash
      run: go install gotest.tools/gotestsum@latest

    - name: Run Go tests with coverage
      shell: bash
      run: |
        set -euo pipefail
        gotestsum \
          --junitfile go-test-results.xml \
          --format testname \
          -- \
          -coverprofile=coverage.out \
          -covermode=atomic \
          ./...
        go test ./internal/... -coverprofile=coverage-internal.out -covermode=atomic
        go tool cover -html=coverage.out -o coverage.html
        go tool cover -html=coverage-internal.out -o coverage-internal.html

    - name: Check go mod tidy
      shell: bash
      run: |
        set -euo pipefail
        go mod tidy
        git diff --exit-code go.mod go.sum

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v8
      with:
        version: v2.1.6

    - name: Run JS smoke tests
      shell: bash
      run: |
        set -euo pipefail
        node --test internal/views/static_test/app.test.mjs | tee js-test-results.tap

    - name: Write coverage summary
      shell: bash
      run: |
        {
          echo "## Test Coverage"
          echo ""
          echo "### Internal Packages"
          echo ""
          echo '```'
          go tool cover -func=coverage-internal.out
          echo '```'
          echo ""
          echo "### Whole Repository"
          echo ""
          echo '```'
          go tool cover -func=coverage.out
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload test and coverage reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-and-coverage-reports
        path: |
          go-test-results.xml
          coverage.out
          coverage.html
          coverage-internal.out
          coverage-internal.html
          js-test-results.tap
        if-no-files-found: warn
