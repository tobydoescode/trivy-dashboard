name: Source security
description: Run source-level vulnerability checks.

runs:
  using: composite
  steps:
    - name: Install govulncheck
      shell: bash
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run govulncheck
      shell: bash
      run: |
        set -euo pipefail
        "$(go env GOPATH)/bin/govulncheck" ./... 2>&1 | tee govulncheck.txt

    - name: Install actionlint
      shell: bash
      run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

    - name: Install shellcheck
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v shellcheck >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y shellcheck
        fi

    - name: Run workflow and shell lint
      shell: bash
      run: |
        set -euo pipefail
        "$(go env GOPATH)/bin/actionlint"
        shellcheck scripts/*.sh

    - name: Write source security summary
      if: always()
      shell: bash
      run: |
        {
          echo "## Source Security"
          echo ""
          if [[ -s govulncheck.txt ]]; then
            echo '```'
            tail -n 80 govulncheck.txt
            echo '```'
          else
            echo "govulncheck produced no output."
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Upload source security reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: source-security-reports
        path: govulncheck.txt
        if-no-files-found: warn
