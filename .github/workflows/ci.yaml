name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/trivy-dashboard

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      build-needed: ${{ steps.check.outputs.build-needed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          PUSH_BEFORE: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [[ "$REF_TYPE" == "tag" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "build-needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
          else
            base="$PUSH_BEFORE"
          fi

          ./scripts/docker-build-needed.sh "$base"

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - uses: ./.github/actions/test

  source-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: ./.github/actions/source-security

  image-build:
    needs: [changes, test, source-security]
    if: needs.changes.outputs.build-needed == 'true'
    permissions:
      contents: read
      security-events: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: docker/setup-buildx-action@v4

      - name: Build candidate image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          load: true
          tags: ${{ env.IMAGE }}:arch-${{ matrix.arch }}-sha-${{ github.sha }}
          push: false
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}

      - uses: ./.github/actions/image-smoke
        with:
          image-ref: ${{ env.IMAGE }}:arch-${{ matrix.arch }}-sha-${{ github.sha }}
          artifact-suffix: -${{ matrix.arch }}

      - uses: ./.github/actions/image-security
        with:
          image-ref: ${{ env.IMAGE }}:arch-${{ matrix.arch }}-sha-${{ github.sha }}
          artifact-suffix: -${{ matrix.arch }}

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push validated arch image
        if: github.event_name != 'pull_request'
        run: docker push "${{ env.IMAGE }}:arch-${{ matrix.arch }}-sha-${{ github.sha }}"

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="$(docker buildx imagetools inspect "${{ env.IMAGE }}:arch-${{ matrix.arch }}-sha-${{ github.sha }}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request'
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: image-build
    if: github.event_name != 'pull_request' && needs.image-build.result == 'success'
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=("-t" "$tag")
          done

          digest_args=()
          for digest_file in *; do
            digest_args+=("${{ env.IMAGE }}@sha256:${digest_file}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"

      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
